<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Classroom Multiplayer Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; overflow: hidden; }
    #chat-container {
      position: absolute; bottom: 10px; left: 10px;
      width: 300px; background: rgba(0,0,0,0.5);
      color: white; padding: 8px; border-radius: 8px;
    }
    #chat-messages { height: 100px; overflow-y: auto; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-messages"></div>
    <input id="chat-input" type="text" placeholder="Type message..." />
  </div>
  <div id="audio-controls" style="position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding:8px; border-radius:8px;">
    <div style="display:flex;gap:8px;align-items:center;">
      <select id="player-select"><option value="">Select player</option></select>
      <button id="call-peer">Call Peer</button>
      <button id="hangup-peer">Hang Up</button>
    </div>
    <div style="margin-top:6px;display:flex;gap:8px;align-items:center;">
      <button id="broadcast-voice">Broadcast Voice (to all)</button>
      <button id="hangup-all">Hang Up All</button>
    </div>
    <div id="active-calls" style="margin-top:8px; font-size:12px;"></div>
  </div>

  <!-- Import map: lets Three.js add-ons resolve the bare "three" specifier -->
  <script type="importmap">
  {
    "imports": {
      "three": "/three/build/three.module.js",
      "three/addons/": "/three/examples/jsm/"
    }
  }
  </script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
